<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15문장 영어 암기 트레이너 + AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Markdown parsing library for AI responses -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        .eng-font {
            font-family: 'Roboto', sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Chip Animation */
        .word-chip {
            transition: all 0.2s ease;
        }
        .word-chip:active {
            transform: scale(0.95);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* AI Response Styling */
        .ai-content h1, .ai-content h2, .ai-content h3 { font-weight: bold; margin-top: 0.5em; margin-bottom: 0.2em; color: #4338ca; }
        .ai-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .ai-content p { margin-bottom: 0.5em; }
        .ai-content strong { color: #3730a3; }
        
        .sparkle-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
        }
        .sparkle-btn:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Container -->
    <div class="bg-white w-full max-w-3xl rounded-2xl shadow-xl overflow-hidden flex flex-col h-[95vh] md:h-[90vh]">
        
        <!-- Header -->
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center shadow-md shrink-0">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-brain"></i>
                <span class="hidden sm:inline">15문장 암기 트레이너</span>
                <span class="sm:hidden">암기 트레이너</span>
                <span class="text-xs bg-indigo-800 px-2 py-0.5 rounded text-yellow-300 ml-1">AI Powered</span>
            </h1>
            <div class="text-sm bg-indigo-500 px-3 py-1 rounded-full">
                <span id="progress-text">1 / 15</span>
            </div>
        </div>

        <!-- Navigation & Controls -->
        <div class="bg-gray-50 p-3 border-b border-gray-200 flex flex-wrap justify-between items-center gap-2 shrink-0">
            <div class="flex space-x-2">
                <button onclick="prevSentence()" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 text-gray-700 transition text-sm"><i class="fas fa-chevron-left"></i> 이전</button>
                <button onclick="nextSentence()" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 text-gray-700 transition text-sm">다음 <i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="flex space-x-2">
                <button onclick="toggleShuffle()" id="shuffle-btn" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="순서 섞기"><i class="fas fa-random"></i></button>
                <select id="jump-select" onchange="jumpTo(this.value)" class="px-2 py-1.5 border border-gray-300 rounded-lg text-sm max-w-[100px] sm:max-w-none">
                    <!-- Options populated by JS -->
                </select>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 p-4 sm:p-6 flex flex-col items-center relative overflow-y-auto" id="card-container">
            
            <!-- Mode Tabs -->
            <div class="w-full flex justify-center flex-wrap gap-2 mb-6 shrink-0">
                <button onclick="setMode('study')" id="mode-study" class="mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-indigo-100 text-indigo-700 ring-2 ring-indigo-500">학습</button>
                <button onclick="setMode('blank')" id="mode-blank" class="mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200">빈칸</button>
                <button onclick="setMode('initial')" id="mode-initial" class="mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200">초성</button>
                <button onclick="setMode('scramble')" id="mode-scramble" class="mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200">단어배열</button>
                <button onclick="setMode('test')" id="mode-test" class="mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200">테스트</button>
            </div>

            <!-- Sentence Display & Input Area -->
            <div class="w-full text-center fade-in space-y-4 max-w-2xl mx-auto">
                
                <!-- Prompt + Input Container (Flex Column for stacking) -->
                <div class="relative min-h-[100px] flex flex-col items-center justify-center py-4 gap-4">
                    
                    <!-- Display Area (Full text, Blanks, or Initials) -->
                    <p id="english-display" class="eng-font text-xl sm:text-2xl md:text-3xl font-medium text-gray-800 leading-relaxed"></p>
                    
                    <!-- Scramble Game Area (New) -->
                    <div id="scramble-area" class="hidden w-full transition-all duration-300 ease-in-out">
                         <!-- Target (Answer) Area -->
                        <div id="scramble-target" class="min-h-[80px] p-4 bg-gray-50 border-2 border-indigo-100 rounded-xl flex flex-wrap gap-2 items-center justify-center mb-4 transition-all shadow-inner">
                            <span class="text-gray-400 text-sm select-none">아래 단어들을 클릭하여 이곳으로 옮기세요</span>
                        </div>
                        
                        <!-- Source (Bank) Area -->
                        <div id="scramble-source" class="flex flex-wrap gap-2 justify-center mb-6 min-h-[50px]">
                            <!-- Word chips go here -->
                        </div>

                        <!-- Controls -->
                        <div class="flex justify-center gap-3">
                            <button onclick="checkScrambleAnswer()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-medium text-sm transition shadow flex items-center gap-2">
                                <i class="fas fa-check"></i> 정답 확인
                            </button>
                            <button onclick="resetScramble()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 font-medium text-sm transition shadow flex items-center gap-2">
                                <i class="fas fa-undo"></i> 다시 하기
                            </button>
                        </div>
                        
                        <!-- Feedback -->
                        <div id="scramble-feedback" class="mt-4 hidden p-4 rounded-lg bg-gray-50 border border-gray-200 shadow-sm text-left"></div>
                    </div>

                    <!-- Input Area (Visible in Blank, Initial, Test modes) -->
                    <div id="test-area" class="hidden w-full transition-all duration-300 ease-in-out">
                        <textarea id="test-input" placeholder="여기에 영어 문장을 입력하세요..." class="w-full p-4 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none eng-font text-lg resize-none shadow-inner bg-gray-50 focus:bg-white transition-colors" rows="3"></textarea>
                        <div class="mt-3 flex justify-between items-center">
                            <button onclick="checkAnswer()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-medium text-sm transition shadow flex items-center gap-2">
                                <i class="fas fa-check"></i> 정답 확인
                            </button>
                            <button onclick="showHint()" class="text-indigo-600 hover:text-indigo-800 hover:underline text-sm font-medium flex items-center gap-1">
                                <i class="fas fa-lightbulb"></i> 힌트 보기
                            </button>
                        </div>
                        <div id="test-feedback" class="mt-4 text-left hidden p-4 rounded-lg bg-gray-50 border border-gray-200 shadow-sm">
                            <!-- Feedback content -->
                        </div>
                    </div>
                </div>

                <!-- Action Buttons (TTS) -->
                <div class="flex justify-center h-8">
                     <button onclick="speakSentence()" class="text-gray-400 hover:text-indigo-600 transition p-2 transform hover:scale-110" title="듣기">
                        <i class="fas fa-volume-up text-xl"></i>
                    </button>
                </div>

                <!-- Korean Translation -->
                <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-100 w-full shadow-sm">
                    <p id="korean-display" class="text-gray-700 text-base sm:text-lg font-medium word-keep-all"></p>
                </div>

                <!-- AI Features Section -->
                <div class="pt-6 w-full border-t border-gray-100 mt-6">
                    <div class="flex justify-center gap-3 mb-4">
                        <button onclick="askAI('explain')" class="sparkle-btn px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all">
                            <i class="fas fa-magic"></i> AI 문법 분석
                        </button>
                        <button onclick="askAI('similar')" class="sparkle-btn px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all">
                            <i class="fas fa-clone"></i> 유사 문장 생성
                        </button>
                    </div>

                    <!-- AI Result Container -->
                    <div id="ai-result-container" class="hidden bg-indigo-50 border border-indigo-100 rounded-xl p-5 text-left text-sm text-gray-800 shadow-inner w-full relative">
                        <button onclick="closeAI()" class="absolute top-2 right-3 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                        <div id="ai-loading" class="hidden flex flex-col items-center justify-center py-4 text-indigo-600">
                            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                            <span class="text-xs font-semibold animate-pulse">Gemini가 분석 중입니다...</span>
                        </div>
                        <div id="ai-content" class="ai-content leading-relaxed hidden"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer Info -->
        <div class="bg-gray-50 p-3 text-center text-xs text-gray-400 shrink-0">
            Powered by Google Gemini API
        </div>
    </div>

    <script>
        // 1. Data Source (PDF에서 추출한 새로운 15문장 데이터)
        const sentences = [
            { id: 1, en: "Rather, it is desirable that we develop games that connect to the learning outcomes we want for our students.", kr: "오히려, 우리가 학생들에게 원하는 학습 성과와 연결되는 게임을 개발하는 것이 바람직하다." },
            { id: 2, en: "You'll feel better from having an emotional release and feel support from those with whom you share.", kr: "감정을 표출시킴으로써 기분이 좋아지고, 감정을 함께 나누는 사람들로부터 지지를 받을 수 있을 것이다." },
            { id: 3, en: "In this way, the operations of the culinary field reproduce gender inequalities by valuing qualities associated with a masculine tradition more highly and excluding women from criteria used to classify 'great chefs'.", kr: "이러한 방식으로 요리 분야의 운영은 남성적 전통과 관련된 자질을 더 높이 평가하고 여성을 '위대한 셰프'를 분류하는 기준에서 제외함으로써 성 불평등을 재생산한다." },
            { id: 4, en: "This self-delusion helps us maintain our stereotypes while reducing the possibility for cognitive dissonance related to our self-concept.", kr: "이러한 자기기만은 우리의 자아 개념과 관련된 인지 부조화의 가능성은 줄이면서 우리가 고정관념을 유지하는 데 도움이 된다." },
            { id: 5, en: "People are confronted with the cognitive dissonance aroused by the thought that one has stereotypes of others that guide one's social judgments, and the thought that one is a good, fair, and rational thinker.", kr: "사람들은 자신의 사회적 판단을 이끄는 타인에 대한 고정관념을 자신이 가지고 있다는 생각과 자신이 착하고 공정하며 이성적인 사고자라는 생각으로 인해 발생하는 인지 부조화에 직면하게 된다." },
            { id: 6, en: "Our biological drive to consume tasty food to completion outweighs any opposing cognitive or motivational factors.", kr: "맛있는 음식을 끝까지 먹는 것에 대한 우리의 생물학적 욕구는 그 어떤 반대되는 인지적 또는 동기 부여 요인보다 더 크다." },
            { id: 7, en: "They are easier to reach in the sense that audiences have fragmented into narrow interest groups that are served by thousands of special interest magazines and TV channels.", kr: "독자가 수천 개의 전문 잡지와 TV 채널이 봉사하는 좁은 관심 집단으로 분열되었다는 점에서 그들의 관심을 얻기가 더 쉽다." },
            { id: 8, en: "Issues of war and peace, the environment and poverty are all of such a scope, and involve so many transnational linkages that they cannot be handled satisfactorily by single states alone.", kr: "전쟁과 평화, 환경과 빈곤 문제가 모두 이러한 범주에 속하며, 너무나 많은 초국가적인 연관성을 수반하고 있어서 그것들은 단일 국가만으로는 만족스럽게 처리될 수 없다." },
            { id: 9, en: "We think it's important to overcome any tendency to not talk about climate change for fear that other people might not feel the same way.", kr: "우리는 다른 사람들과 같은 의견이 아닐 수도 있다는 두려움 때문에 기후 변화에 대해 이야기하지 않으려는 경향을 극복하는 것이 중요하다고 생각한다." },
            { id: 10, en: "You'll also find that children will get quicker at these checks and take control of them themselves over time, providing them with a toolkit to ensure their own well-being when writing.", kr: "또한 당신은 시간이 지나면서 아이들이 이러한 점검을 더 빠르게 하고 스스로 조절하게 되어, 글쓰기 할 때 아이들에게 자신의 행복을 보장할 수 있는 도구를 제공할 것임을 알게 될 것이다." },
            { id: 11, en: "Industrialization raised the potential value of every single work hour - the more hours you worked, the more widgets you produced, and the more money you made and thus wages became tied to effort and production.", kr: "산업화는 모든 개별 근무 시간의 잠재적 가치를 높였는데, 더 많은 시간을 일했을수록, 더 많은 제품을 생산했고, 더 많은 돈을 벌었으며, 이로써 임금은 노력과 생산량에 연계되었다." },
            { id: 12, en: "In this way, the operations of the culinary field reproduce gender inequalities by valuing qualities associated with a masculine tradition more highly and excluding women from criteria used to classify 'great chefs'.", kr: "이러한 방식으로 요리 분야의 운영은 남성적 전통과 관련된 자질을 더 높이 평가하고 여성을 '위대한 셰프'를 분류하는 기준에서 제외함으로써 성 불평등을 재생산한다." },
            { id: 13, en: "In the words of one UK publishing executive, 'brands make it easier for the customer to make choices as the world gets more complicated'.", kr: "한 영국 출판업계 임원의 말을 빌리자면, \"브랜드는 세상이 복잡해짐에 따라 고객이 선택을 더 쉽게 하도록 해준다.\"" },
            { id: 14, en: "These two types of traffic should be kept separate to avoid conflict and confusion.", kr: "이러한 두 종류의 교통은 충돌과 혼란을 피하기 위해 분리되어 있어야 한다." },
            { id: 15, en: "In this context at least, the AI may be starting to recognise silence not as an absence but as meaningful data.", kr: "적어도 이런 맥락에서는 AI는 침묵을 없는 상태가 아니라 의미 있는 데이터라고 인식하기 시작했을지도 모른다." }
        ];

        // 2. State Management
        let currentIndex = 0;
        let currentMode = 'study'; // study, blank, initial, scramble, test
        let isShuffled = false;
        let studyOrder = [...Array(sentences.length).keys()];
        
        // Scramble Game State
        let scrambleState = {
            originalWords: [],
            sourceWords: [], // Objects {id, text}
            targetWords: []  // Objects {id, text}
        };
        
        // API Key (Injected by environment)
        const apiKey = "AIzaSyC-PIE1aBNgB1bUZvevxYgMm5-ofZtMu4M"; 

        // 3. Initialization
        window.onload = function() {
            populateJumpSelect();
            render();
            
            // Allow enter key for test
            document.getElementById('test-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAnswer();
                }
            });
        };

        // 4. Core Logic
        function render() {
            const dataIndex = studyOrder[currentIndex];
            const item = sentences[dataIndex];
            const total = sentences.length;

            // Update Progress
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${total}`;
            document.getElementById('jump-select').value = currentIndex;

            // Close AI Result on navigate
            closeAI();

            // Reset Areas
            const testArea = document.getElementById('test-area');
            const scrambleArea = document.getElementById('scramble-area');
            const engDisplay = document.getElementById('english-display');
            const testInput = document.getElementById('test-input');
            const testFeedback = document.getElementById('test-feedback');
            const scrambleFeedback = document.getElementById('scramble-feedback');
            
            testInput.value = '';
            testFeedback.classList.add('hidden');
            scrambleFeedback.classList.add('hidden');
            
            // Mode Button Styling
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.className = 'mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200';
            });
            const activeBtn = document.getElementById(`mode-${currentMode}`);
            if (activeBtn) {
                activeBtn.className = 'mode-btn px-3 py-1.5 rounded-full text-sm font-medium transition bg-indigo-100 text-indigo-700 ring-2 ring-indigo-500';
            }

            // Korean Text (Always visible)
            document.getElementById('korean-display').innerText = item.kr;

            // Visibility Logic based on Mode
            if (currentMode === 'study') {
                engDisplay.style.display = 'block';
                testArea.classList.add('hidden');
                scrambleArea.classList.add('hidden');
                engDisplay.innerText = item.en;
            
            } else if (currentMode === 'blank') {
                engDisplay.style.display = 'block';
                testArea.classList.remove('hidden');
                scrambleArea.classList.add('hidden');
                engDisplay.innerHTML = generateBlanks(item.en);
                testInput.placeholder = "빈칸을 포함하여 전체 문장을 완성해보세요...";
            
            } else if (currentMode === 'initial') {
                engDisplay.style.display = 'block';
                testArea.classList.remove('hidden');
                scrambleArea.classList.add('hidden');
                engDisplay.innerHTML = generateInitials(item.en);
                testInput.placeholder = "초성을 보고 전체 문장을 입력하세요...";
            
            } else if (currentMode === 'test') {
                engDisplay.style.display = 'none';
                testArea.classList.remove('hidden');
                scrambleArea.classList.add('hidden');
                testInput.placeholder = "암기한 문장을 안 보고 입력하세요...";
                testInput.focus();

            } else if (currentMode === 'scramble') {
                engDisplay.style.display = 'none';
                testArea.classList.add('hidden');
                scrambleArea.classList.remove('hidden');
                initScramble(item.en);
            }

            // Animation Reset
            const container = document.getElementById('card-container');
            container.classList.remove('fade-in');
            void container.offsetWidth; // trigger reflow
            container.classList.add('fade-in');
        }

        // --- Scramble Logic ---

        function initScramble(text) {
            const words = text.split(/\s+/);
            scrambleState.originalWords = words;
            scrambleState.targetWords = [];
            
            let tempSource = words.map((word, index) => ({ id: index, text: word }));
            
            // Shuffle
            for (let i = tempSource.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tempSource[i], tempSource[j]] = [tempSource[j], tempSource[i]];
            }
            scrambleState.sourceWords = tempSource;
            
            renderScrambleUI();
        }

        function renderScrambleUI() {
            const targetEl = document.getElementById('scramble-target');
            const sourceEl = document.getElementById('scramble-source');
            
            // Render Target
            targetEl.innerHTML = '';
            if (scrambleState.targetWords.length === 0) {
                 targetEl.innerHTML = '<span class="text-gray-400 text-sm select-none">아래 단어들을 클릭하여 이곳으로 옮기세요</span>';
            } else {
                scrambleState.targetWords.forEach((item, index) => {
                    const chip = createWordChip(item.text, 'target', index);
                    targetEl.appendChild(chip);
                });
            }

            // Render Source
            sourceEl.innerHTML = '';
            scrambleState.sourceWords.forEach((item, index) => {
                const chip = createWordChip(item.text, 'source', index);
                sourceEl.appendChild(chip);
            });
        }

        function createWordChip(text, type, index) {
            const btn = document.createElement('button');
            btn.className = `word-chip px-3 py-1.5 rounded-lg font-medium text-sm shadow-sm border transition-all 
                ${type === 'target' 
                    ? 'bg-indigo-100 text-indigo-700 border-indigo-200 hover:bg-red-50 hover:text-red-600 hover:border-red-200' 
                    : 'bg-white text-gray-700 border-gray-200 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200'}`;
            btn.innerText = text;
            btn.onclick = () => handleWordClick(type, index);
            return btn;
        }

        function handleWordClick(type, index) {
            if (type === 'source') {
                const item = scrambleState.sourceWords.splice(index, 1)[0];
                scrambleState.targetWords.push(item);
            } else {
                const item = scrambleState.targetWords.splice(index, 1)[0];
                scrambleState.sourceWords.push(item);
            }
            document.getElementById('scramble-feedback').classList.add('hidden');
            renderScrambleUI();
        }

        function checkScrambleAnswer() {
            const userSentence = scrambleState.targetWords.map(w => w.text).join(' ');
            const originalSentence = scrambleState.originalWords.join(' ');
            const feedback = document.getElementById('scramble-feedback');
            
            feedback.classList.remove('hidden');
            
            if (userSentence === originalSentence) {
                feedback.innerHTML = `<div class="text-green-600 font-bold flex items-center gap-2"><i class="fas fa-check-circle"></i> <span>정답입니다! 완벽해요.</span></div>`;
                playSound('correct');
            } else {
                feedback.innerHTML = `
                     <div class="text-red-500 font-bold mb-2 flex items-center gap-2"><i class="fas fa-times-circle"></i> <span>순서가 맞지 않습니다.</span></div>
                     <div class="text-sm text-gray-600">힌트: 문장의 첫 단어와 마지막 단어를 확인해보세요.</div>
                `;
                playSound('wrong');
            }
        }

        function resetScramble() {
            const dataIndex = studyOrder[currentIndex];
            const item = sentences[dataIndex];
            initScramble(item.en);
            document.getElementById('scramble-feedback').classList.add('hidden');
        }


        // --- Helper Functions ---

        function generateBlanks(text) {
            const words = text.split(' ');
            return words.map(word => {
                const cleanWord = word.replace(/[.,;’'“”\-]/g, "");
                if (cleanWord.length <= 3) return word;
                
                const firstChar = word[0];
                const lastChar = word.slice(-1).match(/[.,;?!]/) ? word.slice(-1) : '';
                
                return `<span class="text-indigo-600 font-bold border-b-2 border-indigo-300 mx-1 min-w-[30px] inline-block text-center">&nbsp;&nbsp;&nbsp;</span>` + lastChar;
            }).join(' ');
        }

        function generateInitials(text) {
            const words = text.split(' ');
            return words.map(word => {
                if (!word.match(/[a-zA-Z]/)) return word;

                const firstChar = word[0];
                let rest = "";
                let punctuation = "";
                
                for(let i=1; i<word.length; i++) {
                    if (word[i].match(/[a-zA-Z0-9’'-]/)) {
                        rest += "_";
                    } else {
                        punctuation += word[i];
                    }
                }
                return `<span class="text-indigo-700 font-bold">${firstChar}</span><span class="text-gray-300">${rest}</span>${punctuation}`;
            }).join(' ');
        }

        function checkAnswer() {
            const dataIndex = studyOrder[currentIndex];
            const target = sentences[dataIndex].en;
            const input = document.getElementById('test-input').value.trim();
            const feedback = document.getElementById('test-feedback');
            
            feedback.classList.remove('hidden');

            const normTarget = target.toLowerCase().replace(/[^a-z0-9]/g, '');
            const normInput = input.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (normTarget === normInput) {
                feedback.innerHTML = `<div class="text-green-600 font-bold flex items-center gap-2"><i class="fas fa-check-circle"></i> <span>정답입니다! 완벽해요.</span></div>`;
                playSound('correct');
            } else {
                feedback.innerHTML = `
                    <div class="text-red-500 font-bold mb-2 flex items-center gap-2"><i class="fas fa-times-circle"></i> <span>다시 시도해보세요.</span></div>
                    <div class="text-xs text-gray-500 uppercase tracking-wide font-semibold mb-1">정답 (Correct Answer):</div>
                    <div class="text-gray-800 font-medium bg-white p-2 rounded border border-gray-200">${target}</div>
                `;
                playSound('wrong');
            }
        }

        function showHint() {
            const dataIndex = studyOrder[currentIndex];
            const target = sentences[dataIndex].en;
            const input = document.getElementById('test-input');
            const words = target.split(' ');
            const currentVal = input.value.trim();
            if (!currentVal) {
                input.value = words.slice(0, Math.min(words.length, 3)).join(' ') + " ";
            } else {
                const inputWordCount = currentVal.split(/\s+/).length;
                if (inputWordCount < words.length) {
                    input.value = words.slice(0, inputWordCount + 1).join(' ') + " ";
                }
            }
            input.focus();
        }

        // --- Controls ---

        function setMode(mode) {
            currentMode = mode;
            render();
        }

        function nextSentence() {
            if (currentIndex < sentences.length - 1) {
                currentIndex++;
                render();
            } else {
                currentIndex = 0;
                render();
            }
        }

        function prevSentence() {
            if (currentIndex > 0) {
                currentIndex--;
                render();
            }
        }

        function jumpTo(index) {
            currentIndex = parseInt(index);
            render();
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            const btn = document.getElementById('shuffle-btn');
            
            if (isShuffled) {
                btn.classList.replace('text-gray-500', 'text-indigo-600');
                btn.classList.add('bg-indigo-50');
                for (let i = studyOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [studyOrder[i], studyOrder[j]] = [studyOrder[j], studyOrder[i]];
                }
            } else {
                btn.classList.replace('text-indigo-600', 'text-gray-500');
                btn.classList.remove('bg-indigo-50');
                studyOrder = [...Array(sentences.length).keys()];
            }
            currentIndex = 0;
            render();
        }

        function populateJumpSelect() {
            const select = document.getElementById('jump-select');
            select.innerHTML = '';
            sentences.forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = `${s.id}번 문장`;
                select.appendChild(opt);
            });
        }

        // --- Audio / TTS ---
        function speakSentence() {
            const dataIndex = studyOrder[currentIndex];
            const text = sentences[dataIndex].en;
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("이 브라우저는 음성 합성을 지원하지 않습니다.");
            }
        }

        // --- Sound Effects ---
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.setValueAtTime(200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.log("Audio Web API is not supported in this browser.");
            }
        }

        // --- AI API Integration ---
        async function askAI(type) {
            if (!apiKey) {
                alert("API 키가 설정되지 않았습니다. 소스 코드 상단의 apiKey 변수에 Google Gemini API 키를 입력해주세요.");
                return;
            }

            const dataIndex = studyOrder[currentIndex];
            const item = sentences[dataIndex];
            
            const container = document.getElementById('ai-result-container');
            const loading = document.getElementById('ai-loading');
            const content = document.getElementById('ai-content');
            
            container.classList.remove('hidden');
            loading.classList.remove('hidden');
            content.classList.add('hidden');
            content.innerHTML = '';

            let prompt = "";
            if (type === 'explain') {
                prompt = `다음 영어 문장의 문법 구조와 핵심 단어를 학습자가 이해하기 쉽게 분석해주세요. 한국어로 친절하고 간결하게 설명해주세요:\n\n"${item.en}"\n(의미: ${item.kr})`;
            } else if (type === 'similar') {
                prompt = `다음 영어 문장과 유사한 문법 구조나 어휘를 가진 실생활 예문 3개를 만들어주세요. 각 예문의 한국어 뜻도 함께 적어주세요:\n\n"${item.en}"`;
            }

            try {
                const responseText = await callGeminiAPI(prompt);
                // Parse markdown using marked.js
                content.innerHTML = marked.parse(responseText);
            } catch (error) {
                content.innerHTML = `<p class="text-red-500 font-medium"><i class="fas fa-exclamation-triangle"></i> AI 응답을 불러오는 중 오류가 발생했습니다.<br><span class="text-sm mt-1 block">${error.message}</span></p>`;
            } finally {
                loading.classList.add('hidden');
                content.classList.remove('hidden');
            }
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            if (!response.ok) {
                throw new Error("API 요청 실패: API 키가 유효한지 확인하세요.");
            }

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                return data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("유효하지 않은 응답 형식입니다.");
            }
        }

        function closeAI() {
            document.getElementById('ai-result-container').classList.add('hidden');
        }
    </script>
